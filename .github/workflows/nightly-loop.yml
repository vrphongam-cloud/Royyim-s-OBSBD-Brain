name: Nightly Brain Loop

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  run-loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/loop.py

      - - name: Commit results
        run: |
          git config user.name "OBSBD Brain"
          git config user.email "brain@fn-decor.com"
          git pull --rebase origin main
          git add knowledge-base/ logs/
          git diff --staged --quiet || git commit -m "Brain loop: $(date +'%Y-%m-%d')"
          git push
